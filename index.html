<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin URL Shortener</title>

<style>
body{font-family:'Segoe UI';background:#f1f5f9;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
h2{text-align:center}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc}
button{padding:10px 15px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #ddd}
th{background:#2563eb;color:white}
.actions button{margin-right:5px;font-size:12px;padding:6px 10px}
</style>

</head>
<body>

<div class="container">

<h2>🔗 Admin URL Shortener</h2>

<div class="card">
<h3>Tambah URL</h3>
<input id="url" placeholder="https://...">
<button onclick="tambah()">Simpan</button>
</div>

<div class="card">
<h3>Data URL</h3>
<table>
<thead>
<tr>
<th>Slug</th>
<th>Short URL</th>
<th>Klik</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx2JSmlwhBQ2so5lqT3yaSw-eWcqvVb5HfNXoXT3wVJAQohnlrTy1cOacxnkYuI5JqG/exec";
const BASE = "https://yanuar-moga.github.io/s/?u=";

/* AUTO SLUG */
function slug(){
return Math.random().toString(36).substring(2,7);
}

/* TAMBAH */
function tambah(){

let url = document.getElementById("url").value.trim();

if(!url){
alert("Isi URL!");
return;
}

let s = slug();

fetch(API,{
method:"POST",
body:JSON.stringify({slug:s,url:url})
})
.then(()=>{

alert("Berhasil dibuat!\n"+BASE+s);

document.getElementById("url").value="";
load();

});

}

/* LOAD DATA */
function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(d=>{

let shortLink = BASE + d.slug;

html+=`
<tr>
<td><b>${d.slug}</b></td>
<td><a href="${shortLink}" target="_blank">${shortLink}</a></td>
<td>${d.klik}</td>
<td class="actions">
<button onclick="copy('${shortLink}')">Copy</button>
</td>
</tr>
`;

});

document.getElementById("data").innerHTML = html;

});

}

/* COPY */
function copy(text){
navigator.clipboard.writeText(text);
alert("Link disalin!");
}

load();

</script>

</body>
</html>
