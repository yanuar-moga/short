<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener PRO</title>

<style>
body{
font-family:'Segoe UI';
margin:0;
background:#f8fafc;
color:#1e293b;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.row input{
flex:1;
}

.search{
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th, td{
padding:10px;
font-size:14px;
text-align:left;
}

th{
background:#2563eb;
color:white;
}

td{
border-bottom:1px solid #eee;
}

.actions button{
margin-right:5px;
font-size:12px;
padding:6px 10px;
}

.badge{
background:#22c55e;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

@media(max-width:600px){
th,td{font-size:12px}
}
</style>
</head>

<body>

<div class="container">

<h2>🔗 URL Shortener PRO</h2>

<div class="card">

<h3>Tambah URL</h3>

<div class="row">
<input id="slug" placeholder="contoh: bayu">
<input id="url" placeholder="https://...">
</div>

<button onclick="tambah()">Simpan</button>

</div>

<div class="card">

<h3>Data URL</h3>

<input class="search" id="search" placeholder="Cari slug..." onkeyup="load()">

<table>
<thead>
<tr>
<th>Slug</th>
<th>Short URL</th>
<th>Klik</th>
<th>QR</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx2JSmlwhBQ2so5lqT3yaSw-eWcqvVb5HfNXoXT3wVJAQohnlrTy1cOacxnkYuI5JqG/exec";
const BASE = "https://yanuar-moga.github.io/s/";

/* TAMBAH */
function tambah(){

let slug = document.getElementById("slug").value.trim();
let url = document.getElementById("url").value.trim();

if(!slug || !url){
alert("Isi semua data!");
return;
}

if(!/^[a-z0-9-]+$/.test(slug)){
alert("Slug hanya huruf kecil, angka, -");
return;
}

fetch(API)
.then(res=>res.json())
.then(data=>{

if(data.find(x=>x.slug===slug)){
alert("Slug sudah dipakai!");
return;
}

fetch(API,{
method:"POST",
body:JSON.stringify({action:"add",slug:slug,url:url})
})
.then(()=>{
alert("Berhasil!\n"+BASE+slug);
document.getElementById("slug").value="";
document.getElementById("url").value="";
load();
});

});

}

/* LOAD */
function load(){

let keyword = document.getElementById("search").value.toLowerCase();

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";

data.filter(x=>x.slug.includes(keyword)).forEach(d=>{

let short = BASE+d.slug;
let qr = "https://api.qrserver.com/v1/create-qr-code/?size=80x80&data="+short;

html+=`
<tr>
<td><b>${d.slug}</b></td>
<td><a href="${short}" target="_blank">${short}</a></td>
<td><span class="badge">${d.klik}</span></td>
<td><img src="${qr}"></td>
<td class="actions">
<button onclick="copy('${short}')">Copy</button>
<button onclick="hapus('${d.slug}')">Hapus</button>
</td>
</tr>
`;

});

document.getElementById("data").innerHTML = html;

});

}

/* COPY */
function copy(text){
navigator.clipboard.writeText(text);
alert("Link disalin!");
}

/* HAPUS */
function hapus(slug){
if(confirm("Hapus link ini?")){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"delete",slug:slug})
}).then(()=>{
load();
});
}
}

load();

</script>

</body>
</html>
