<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Shortener PRO</title>

<style>
body{font-family:Segoe UI;margin:0;background:#f1f5f9}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;box-shadow:0 5px 20px rgba(0,0,0,.08)}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin:5px 0}
button{padding:8px 14px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
button:hover{background:#1d4ed8}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
th{background:#2563eb;color:white}
.badge{background:#22c55e;color:#fff;padding:4px 8px;border-radius:6px}
.stat{display:flex;gap:10px;margin-bottom:15px}
.stat div{flex:1;background:#2563eb;color:white;padding:10px;border-radius:10px;text-align:center}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Dashboard URL Shortener</h2>

<div class="stat">
<div>Total Link<br><b id="total">0</b></div>
<div>Total Klik<br><b id="klik">0</b></div>
</div>

<div class="card">
<input id="url" placeholder="URL tujuan (https://...)">
<input id="slug" placeholder="Slug (contoh: bayu)">
<button onclick="tambah()">Tambah</button>
</div>

<div class="card">
<input id="search" placeholder="Cari..." onkeyup="load()">

<table>
<thead>
<tr>
<th>Slug</th>
<th>URL</th>
<th>Klik</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx2JSmlwhBQ2so5lqT3yaSw-eWcqvVb5HfNXoXT3wVJAQohnlrTy1cOacxnkYuI5JqG/exec";
const BASE="https://yanuar-moga.github.io/short/s/";

/* TAMBAH */
function tambah(){

let url=document.getElementById("url").value.trim();
let slug=document.getElementById("slug").value.trim();

if(!url || !slug){
alert("⚠️ Isi semua data!");
return;
}

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"add",
slug:slug,
url:url
})
})
.then(r=>r.json())
.then(res=>{

if(res.status==="duplicate"){
alert("❌ Slug sudah digunakan!");
}
else if(res.status==="ok"){
alert("✅ Berhasil ditambahkan!");
document.getElementById("url").value="";
document.getElementById("slug").value="";
load();
}else{
alert("❌ Gagal menyimpan");
}

});

}

/* LOAD DATA */
function load(){

let keyword=document.getElementById("search").value.toLowerCase();

fetch(API+"?t="+Date.now())
.then(r=>r.json())
.then(data=>{

if(!Array.isArray(data)){
alert("❌ Gagal mengambil data");
return;
}

let html="";
let totalKlik=0;

data
.filter(d=>d.slug.toLowerCase().includes(keyword))
.forEach(d=>{

totalKlik+=d.klik;

html+=`
<tr>
<td>${d.slug}</td>
<td contenteditable onblur="edit('${d.slug}',this.innerText)">
${d.url}
</td>
<td><span class="badge">${d.klik}</span></td>
<td>
<button onclick="copy('${BASE+d.slug}')">Copy</button>
<button onclick="hapus('${d.slug}')">Hapus</button>
</td>
</tr>
`;

});

document.getElementById("data").innerHTML=html;
document.getElementById("total").innerText=data.length;
document.getElementById("klik").innerText=totalKlik;

});

}

/* EDIT */
function edit(slug,url){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"edit",
slug:slug,
url:url
})
});

}

/* 🔐 HAPUS DENGAN PIN (SERVER) */
function hapus(slug){

let pin = prompt("Masukkan PIN Admin:");
if(!pin) return;

if(!confirm("Yakin hapus link ini?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"delete",
slug:slug,
pin:pin
})
})
.then(r=>r.json())
.then(res=>{

if(res.status==="wrong_pin"){
alert("❌ PIN salah!");
}
else if(res.status==="deleted"){
alert("✅ Berhasil dihapus");
load();
}
else if(res.status==="notfound"){
alert("❌ Data tidak ditemukan");
}
else{
alert("❌ Gagal menghapus");
}

});

}

/* COPY */
function copy(text){
navigator.clipboard.writeText(text);
alert("📋 Link disalin!");
}

load();

</script>

</body>
</html>
