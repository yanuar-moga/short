<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect...</title>
</head>
<body>

<script>

const API = "https://script.google.com/macros/s/AKfycbx2JSmlwhBQ2so5lqT3yaSw-eWcqvVb5HfNXoXT3wVJAQohnlrTy1cOacxnkYuI5JqG/exec";

const params = new URLSearchParams(window.location.search);
const slug = params.get("u");

if(!slug){
document.body.innerHTML="<h2>Link tidak valid</h2>";
}else{

fetch(API + "?slug=" + slug)
.then(res=>res.json())
.then(res=>{
  if(res.url){
    window.location.href = res.url;
  }else{
    document.body.innerHTML="<h2>Link tidak ditemukan</h2>";
  }
})
.catch(()=>{
  document.body.innerHTML="<h2>Gagal koneksi</h2>";
});

}

</script>

</body>
</html>
