<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Redirect...</title>
</head>

<body style="font-family:Segoe UI;text-align:center;padding:40px">

<h2>🔗 Mengalihkan...</h2>
<p id="status">Memproses link...</p>

<script>
const API = "https://script.google.com/macros/s/AKfycbx2JSmlwhBQ2so5lqT3yaSw-eWcqvVb5HfNXoXT3wVJAQohnlrTy1cOacxnkYuI5JqG/exec";

const path = window.location.pathname;

// contoh:
// /short/s/algo4
const parts = path.split("/");

// ambil slug (posisi ke-3)
let slug = "";

if(parts.length >= 4 && parts[2] === "s"){
  slug = parts[3];
}

document.getElementById("status").innerText = "Slug: " + slug;

if(slug){

fetch(API + "?slug=" + slug)
.then(res => res.json())
.then(res => {

if(res.url){
window.location.href = res.url;
}else{
document.getElementById("status").innerHTML = "❌ Link tidak ditemukan";
}

})
.catch(()=>{
document.getElementById("status").innerHTML = "❌ Gagal koneksi";
});

}else{
document.getElementById("status").innerHTML = "❌ Format link salah";
}
</script>

</body>
</html>
